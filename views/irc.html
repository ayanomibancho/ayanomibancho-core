<!-- layout: layout -->

<div class="irc-container container animate-fade-in">
  <div class="irc-card glass">
    <div class="irc-header">
      <div class="irc-icon text-glow-teal">💬</div>
      <h1 class="irc-title">IRC Chat Token</h1>
      <p class="irc-subtitle">Generate a secure authentication token to connect to Ripple chat via IRC client.</p>
    </div>

    <div class="irc-warning warning-card">
      <div class="warning-title">⚠️ SECURITY WARNING</div>
      <p class="warning-text">Your IRC token acts as a password. Anyone who has access to this token can access your account and chat on your behalf. Never share it with anyone.</p>
    </div>

    {{token_display_box}}

    <div class="irc-action-panel">
      <form action="/irc/generate" method="POST">
        <button type="submit" class="btn-generate text-glow-teal">Generate New Token</button>
      </form>
    </div>
  </div>
</div>
