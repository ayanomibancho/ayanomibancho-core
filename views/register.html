<!-- layout: layout -->

<div class="auth-container container animate-fade-in">
  <div class="auth-card glass">
    <div class="auth-header">
      <div class="auth-icon text-glow-teal">🌸</div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the AyanomiBancho osu! private server community today.</p>
    </div>

    <!-- Error Message Alert Box -->
    <div class="error-wrapper" style="display: {{error_display}};">
      <div class="error-card">
        <div class="error-title">⚠️ ERROR</div>
        <p class="error-text">{{error}}</p>
      </div>
    </div>

    <form class="auth-form" action="/register" method="POST" autocomplete="off">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" class="form-control" name="username" placeholder="Choose a username (2-15 chars)" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" class="form-control" name="email" placeholder="Enter your email address" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" name="password" placeholder="Choose a secure password (min 6 chars)" required autocomplete="off">
      </div>

      <div class="form-group">
        <label for="password_confirm">Confirm Password</label>
        <input type="password" id="password_confirm" class="form-control" name="password_confirm" placeholder="Confirm your password" required autocomplete="off">
      </div>

      <div class="turnstile-wrapper" style="display: {{turnstile_display}};">
        <div class="cf-turnstile" data-sitekey="{{turnstile_site_key}}" data-theme="dark"></div>
      </div>

      <button type="submit" class="btn btn-auth">Register</button>
    </form>

    <div class="auth-footer-links">
      <p>Already have an account? <a href="/login" class="auth-link text-glow-teal">Sign in here</a></p>
    </div>
  </div>
</div>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
