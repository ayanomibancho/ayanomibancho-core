<!-- layout: layout -->

<div class="auth-container container animate-fade-in">
  <div class="auth-card glass">
    <div class="auth-header">
      <div class="auth-icon text-glow-teal">🔑</div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your AyanomiBancho account to connect and track scores.</p>
    </div>

    <!-- Error Message Alert Box -->
    <div class="error-wrapper" style="display: {{error_display}};">
      <div class="error-card">
        <div class="error-title">⚠️ ERROR</div>
        <p class="error-text">{{error}}</p>
      </div>
    </div>

    <form class="auth-form" action="/login" method="POST">
      <div class="form-group">
        <label for="username">Username or Email</label>
        <input type="text" id="username" class="form-control" name="username" placeholder="Enter your username or email" required autocomplete="username">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" class="form-control" name="password" placeholder="Enter your password" required autocomplete="current-password">
      </div>

      <button type="submit" class="btn btn-auth">Sign In</button>
    </form>

    <div class="auth-footer-links">
      <p>Don't have an account? <a href="/register" class="auth-link text-glow-teal">Register now</a></p>
    </div>
  </div>
</div>
