<!-- layout: layout -->

<div class="edit-container container animate-fade-in">
  <div class="edit-card glass">
    <div class="edit-header">
      <div class="edit-icon text-glow-teal">🎨</div>
      <h1 class="edit-title">Account Settings</h1>
      <p class="edit-subtitle">Update your profile avatar and manage your account details.</p>
    </div>

    <!-- Alert Box for success/error messages -->
    <div class="alert-wrapper" style="display: {{alert_display}};">
      <div class="alert-card {{alert_class}}">
        <div class="alert-title">{{alert_title}}</div>
        <p class="alert-text">{{alert_message}}</p>
      </div>
    </div>

    <!-- Current Avatar Display -->
    <div class="avatar-preview-section">
      <h2 class="section-title-small">Current Avatar</h2>
      <div class="avatar-preview-container">
        <div class="avatar-ring animate-pulse"></div>
        <img class="user-avatar-preview" src="https://a.o.ayanomi.io.vn/{{user_id}}" onerror="this.onerror=null;this.src='/public/avatar.jpg';" alt="Current Avatar">
      </div>
    </div>

    <!-- Avatar Upload Form -->
    <form class="edit-form" action="/home/account/edit" method="POST" enctype="multipart/form-data">
      <div class="form-group">
        <label for="avatar">Choose New Avatar Image</label>
        <div class="file-drop-area">
          <span class="fake-btn">Choose file</span>
          <span class="file-msg">or drag and drop PNG/JPG here</span>
          <input type="file" id="avatar" name="avatar" accept="image/png, image/jpeg" required>
        </div>
        <p class="form-hint">Only PNG, JPG, and JPEG formats are supported. Max size 2MB.</p>
      </div>

      <button type="submit" class="btn-save">Upload New Avatar</button>
    </form>

    <div class="edit-footer-links">
      <p>Want to view your public stats? <a href="/u/{{username}}" class="edit-link text-glow-teal">Go to Profile</a></p>
    </div>
  </div>
</div>

<style>
.edit-container {
  max-width: 550px !important;
  margin: 0 auto;
}

.edit-card {
  padding: 40px;
  display: flex;
  flex-direction: column;
  gap: 28px;
}

.edit-header {
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.edit-icon {
  font-size: 40px;
}

.edit-title {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: -0.5px;
}

.edit-subtitle {
  font-size: 13.5px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* Avatar Preview Section */
.avatar-preview-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 14px;
  background: rgba(0, 0, 0, 0.2);
  border-radius: 12px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.02);
}

.section-title-small {
  font-size: 14px;
  font-weight: 700;
  color: var(--text-secondary);
  letter-spacing: 0.5px;
}

.avatar-preview-container {
  position: relative;
  width: 128px;
  height: 128px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
}

.user-avatar-preview {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  object-fit: cover;
  border: 3px solid rgba(57, 197, 187, 0.3);
  z-index: 2;
  box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
  transition: transform 0.3s ease;
}

.avatar-preview-container:hover .user-avatar-preview {
  transform: scale(1.05);
}

.avatar-ring {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  border-radius: 50%;
  border: 2px dashed var(--miku-teal);
  opacity: 0.5;
  animation: spin 20s linear infinite;
}

@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Form & File Input Styling */
.edit-form {
  display: flex;
  flex-direction: column;
  gap: 24px;
}

/* Custom File Drop Styling */
.file-drop-area {
  position: relative;
  display: flex;
  align-items: center;
  width: 100%;
  max-width: 100%;
  padding: 16px;
  background: rgba(0, 0, 0, 0.35);
  border: 1px dashed rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  transition: var(--transition-smooth);
}

.file-drop-area:hover, .file-drop-area:focus-within {
  border-color: var(--miku-teal);
  box-shadow: 0 0 15px var(--miku-teal-glow);
}

.fake-btn {
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  border-radius: 6px;
  padding: 8px 14px;
  margin-right: 12px;
  font-size: 13px;
  font-weight: 700;
  color: var(--text-primary);
  text-transform: uppercase;
}

.file-msg {
  font-size: 13px;
  font-weight: 400;
  color: var(--text-secondary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.file-drop-area input[type="file"] {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: 100%;
  opacity: 0;
  cursor: pointer;
}

.btn-save {
  background: rgba(57, 197, 187, 0.1);
  border: 1px solid var(--miku-teal);
  color: var(--miku-teal);
  padding: 14px;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  transition: var(--transition-smooth);
  margin-top: 8px;
}

.btn-save:hover {
  background: var(--miku-teal);
  color: #0c0d13;
  transform: translateY(-2px);
  box-shadow: 0 0 20px var(--miku-teal-glow);
}

.edit-footer-links {
  text-align: center;
  font-size: 13.5px;
  color: var(--text-secondary);
}

.edit-link {
  text-decoration: none;
  font-weight: 600;
  margin-left: 4px;
}

.edit-link:hover {
  text-decoration: underline;
}
</style>

<script>
// Simple script to show the selected filename in the upload box
document.getElementById('avatar').addEventListener('change', function(e) {
  var fileName = e.target.files[0] ? e.target.files[0].name : "or drag and drop PNG/JPG here";
  document.querySelector('.file-msg').innerText = fileName;
});
</script>
